<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ product.name }}</title>
</head>
<body>
    <h1>{{ product.name }}</h1>
    <td><img src="{{ product.img.url }}" style="width:80px height:auto;"></td>
    <th>カテゴリ</th>
    <td>{{ product.category }}</td>
    <p>価格: {{ product.price }}円</p>
    <p>{{ product.description }}</p>
    <a href="{% url 'list' %}">商品一覧に戻る</a>
</body>
</html>
